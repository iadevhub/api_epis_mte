<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consulta CA | Unomed</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    header {
      background: linear-gradient(135deg, #1565C0 0%, #0D47A1 100%);
      padding: 10px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    }
    .logo-icon {
      width: 36px; height: 36px;
      background: #fff;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 900; color: #1565C0;
      flex-shrink: 0;
    }
    .logo-text { font-size: 20px; font-weight: 700; color: #fff; }
    .logo-sub  { font-size: 11px; color: #90CAF9; margin-top: 1px; }

    /* ── MAIN — centralizado como Google ── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 20px 40px;
    }

    /* Hero — some quando há resultado */
    .hero {
      text-align: center;
      margin-bottom: 32px;
      width: 100%;
    }
    .hero h1 {
      font-size: 44px; font-weight: 300;
      color: #1565C0; letter-spacing: -1px;
    }
    .hero h1 span { color: #FF8F00; font-weight: 700; }
    .hero p { color: #6b7280; font-size: 14px; margin-top: 8px; }

    /* Caixa de busca */
    .search-box {
      width: 100%; max-width: 580px;
      position: relative;
      margin-bottom: 8px;
    }
    .search-box input {
      width: 100%;
      padding: 16px 54px 16px 22px;
      font-size: 18px;
      border: 2px solid #dde1e7;
      border-radius: 28px;
      outline: none;
      background: #fff;
      color: #1a1a2e;
      box-shadow: 0 1px 6px rgba(32,33,36,.08);
      transition: border .2s, box-shadow .2s;
    }
    .search-box input:focus {
      border-color: #1565C0;
      box-shadow: 0 1px 6px rgba(21,101,192,.25);
    }
    .search-box input::placeholder { color: #9aa0ac; }
    .btn-search {
      position: absolute; right: 14px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      padding: 6px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s;
    }
    .btn-search:hover { background: #f0f2f5; }
    .btn-search svg { fill: #1565C0; }
    .search-hint { font-size: 12px; color: #9aa0ac; margin-bottom: 36px; }

    /* Área do resultado — largura máxima */
    #resultado { width: 100%; max-width: 780px; }

    /* ── ESTADO INICIAL ── */
    .empty-state { display: none; }

    /* ── LOADING ── */
    .loading {
      display: flex; align-items: center; gap: 12px;
      padding: 24px; color: #6b7280; font-size: 14px;
    }
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid #dde1e7;
      border-top-color: #1565C0;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── CARD DE RESULTADO ── */
    .ca-card {
      background: #fff;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,.08);
    }

    /* Faixa de status no topo */
    .ca-card-top {
      padding: 20px 28px 16px;
      border-bottom: 1px solid #f0f2f5;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }
    .ca-card-top.valido   { border-top: 5px solid #2E7D32; }
    .ca-card-top.vencido  { border-top: 5px solid #C62828; }
    .ca-card-top.cancelado{ border-top: 5px solid #757575; }

    .ca-numero {
      font-size: 26px; font-weight: 800; letter-spacing: -0.5px;
      line-height: 1;
    }
    .ca-numero.valido   { color: #2E7D32; }
    .ca-numero.vencido  { color: #C62828; }
    .ca-numero.cancelado{ color: #757575; }

    .ca-tipo {
      font-size: 13px; font-weight: 600;
      text-transform: uppercase; letter-spacing: .6px;
      color: #6b7280; margin-top: 5px;
    }

    .status-badge {
      flex-shrink: 0;
      padding: 7px 18px;
      border-radius: 20px;
      font-size: 13px; font-weight: 700;
      letter-spacing: .3px;
    }
    .status-badge.valido   { background: #E8F5E9; color: #2E7D32; border: 1.5px solid #A5D6A7; }
    .status-badge.vencido  { background: #FFEBEE; color: #C62828; border: 1.5px solid #FFCDD2; }
    .status-badge.cancelado{ background: #F5F5F5; color: #757575; border: 1.5px solid #E0E0E0; }

    /* ── SEÇÃO: DESCRIÇÃO ── */
    .ca-descricao-section {
      padding: 18px 28px;
      background: #f8f9fb;
      border-bottom: 1px solid #f0f2f5;
    }
    .section-label {
      font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .8px;
      color: #9aa0ac; margin-bottom: 8px;
    }
    .ca-descricao-texto {
      font-size: 14px; line-height: 1.7; color: #374151;
    }

    /* ── SEÇÃO: DADOS ── */
    .ca-dados-section {
      padding: 20px 28px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      border-bottom: 1px solid #f0f2f5;
    }

    .dado-item {}
    .dado-label {
      font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .8px;
      color: #9aa0ac; margin-bottom: 4px;
    }
    .dado-valor {
      font-size: 14px; color: #1a1a2e;
      font-weight: 500; word-break: break-word;
      line-height: 1.5;
    }
    .dado-valor.cnpj { font-family: 'Courier New', monospace; font-size: 13px; }

    /* Destaque para validade */
    .dado-valor.valida-loc {
      color: #1565C0; font-style: italic; font-size: 13px;
    }

    /* ── ALERTA VENCIDO ── */
    .alerta-vencido {
      margin: 0 28px 20px;
      padding: 12px 16px;
      background: #FFEBEE;
      border-radius: 8px;
      border-left: 4px solid #C62828;
      font-size: 13px; color: #C62828;
      display: flex; align-items: flex-start; gap: 10px;
    }

    /* ── RODAPÉ DO CARD ── */
    .ca-card-footer {
      padding: 14px 28px;
      background: #f8f9fb;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .ca-fonte {
      font-size: 11px; color: #9aa0ac;
    }
    /* ── ERRO ── */
    .card-erro {
      background: #fff;
      border-radius: 14px;
      padding: 40px;
      text-align: center;
      box-shadow: 0 2px 12px rgba(0,0,0,.08);
    }
    .card-erro .icon { font-size: 44px; margin-bottom: 12px; }
    .card-erro h3 { color: #1a1a2e; margin-bottom: 8px; font-size: 18px; }
    .card-erro p  { color: #6b7280; font-size: 14px; line-height: 1.6; }

    /* ── FOOTER ── */
    footer {
      background: #fff;
      border-top: 1px solid #e8eaed;
      padding: 14px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 12px;
      color: #9aa0ac;
      flex-wrap: wrap;
      gap: 8px;
    }
    footer a { color: #1565C0; text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      main { padding: 32px 16px 24px; }
      .hero h1 { font-size: 32px; }
      .ca-card-top { flex-direction: column; gap: 10px; }
      .ca-dados-section { grid-template-columns: 1fr 1fr; }
      footer { flex-direction: column; text-align: center; }
    }
    @media (max-width: 400px) {
      .ca-dados-section { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo-icon">U</div>
  <div>
    <div class="logo-text">Unomed</div>
    <div class="logo-sub">Medicina e Segurança do Trabalho</div>
  </div>
</header>

<!-- MAIN CENTRALIZADO -->
<main>
  <div class="hero">
    <h1 onclick="resetar()" title="Nova pesquisa" style="cursor:pointer;">Consulta <span>CA</span></h1>
    <p>Certificado de Aprovação de EPI — dados oficiais do Ministério do Trabalho</p>
  </div>

  <div class="search-box">
    <input
      type="number"
      id="inputCa"
      placeholder="Digite o número do CA..."
      min="1"
      autofocus
    />
    <button class="btn-search" onclick="consultar()" title="Consultar">
      <svg width="22" height="22" viewBox="0 0 24 24">
        <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5
                 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59
                 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01
                 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5
                 11.99 14 9.5 14z"/>
      </svg>
    </button>
  </div>
  <p class="search-hint">Pressione Enter para pesquisar</p>

  <div id="resultado"></div>
</main>

<!-- FOOTER -->
<footer>
  <span>Stepenovski Clínica Médica Ltda — CNPJ 11.779.877/0001-09</span>
</footer>

<script>
  const input = document.getElementById('inputCa');
  const resultado = document.getElementById('resultado');

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') consultar();
  });

  function resetar() {
    input.value = '';
    resultado.innerHTML = '';
    input.focus();
  }

  async function consultar() {
    const numero = input.value.trim();
    if (!numero) { input.focus(); return; }

    resultado.innerHTML = `
      <div class="loading">
        <div class="spinner"></div>
        Consultando base do Ministério do Trabalho...
      </div>`;

    try {
      const res = await fetch('/ca/' + numero);

      if (res.status === 404) {
        resultado.innerHTML = `
          <div class="card-erro">
            <div class="icon">🔍</div>
            <h3>CA ${numero} não encontrado</h3>
            <p>
              Verifique se o número está correto.<br>
              Se o CA for recente, aguarde a atualização diária (todo dia às 20h15).<br><br>
              <a href="https://consultaca.com/${numero}" target="_blank">
                Consultar no consultaca.com →
              </a>
            </p>
          </div>`;
        return;
      }

      if (!res.ok) throw new Error('Erro HTTP ' + res.status);

      const ca = await res.json();
      renderCard(ca);

    } catch (e) {
      resultado.innerHTML = `
        <div class="card-erro">
          <div class="icon">⚠️</div>
          <h3>Erro ao consultar</h3>
          <p>${e.message}</p>
        </div>`;
    }
  }

  function renderCard(ca) {
    const st = (ca.status || '').toUpperCase();
    const cls = st === 'VÁLIDO' ? 'valido'
               : st === 'VENCIDO' ? 'vencido'
               : 'cancelado';

    const alertaVencido = (st === 'VENCIDO') ? `
      <div class="alerta-vencido">
        <span>⚠️</span>
        <div>
          <strong>CA Vencido.</strong> Este EPI não pode ser comercializado nem utilizado como EPC/EPI
          conforme NR-06. Verifique a renovação com o fabricante.
        </div>
      </div>` : '';

    const alertaCancelado = (st === 'CANCELADO') ? `
      <div class="alerta-vencido">
        <span>🚫</span>
        <div>
          <strong>CA Cancelado.</strong> Este certificado foi cancelado pelo MTE.
          O EPI não possui mais aprovação vigente.
        </div>
      </div>` : '';

    resultado.innerHTML = `
      <div class="ca-card">

        <!-- TOPO: número + validade + status -->
        <div class="ca-card-top ${cls}">
          <div>
            <div class="ca-numero ${cls}">CA ${ca.numeroCa}</div>
            ${ca.tipoEpi ? `<div class="ca-tipo">${ca.tipoEpi}</div>` : ''}
            ${ca.dataValidade ? `<div class="ca-validade" style="display:inline-block;margin-top:8px;padding:4px 12px;border-radius:6px;font-size:13px;font-weight:700;color:#fff;background:${cls==='vencido'?'#C62828':cls==='cancelado'?'#757575':'#2E7D32'};">Validade: ${formatData(ca.dataValidade)}</div>` : ''}
          </div>
          <span class="status-badge ${cls}">${ca.status || 'SEM STATUS'}</span>
        </div>

        <!-- DADOS EM GRID -->
        <div class="ca-dados-section">

          ${ca.fabricante ? `
          <div class="dado-item" style="grid-column: 1 / -1;">
            <div class="dado-label">Fabricante / Razão Social</div>
            <div class="dado-valor">${ca.fabricante}</div>
          </div>` : ''}

          ${ca.cnpj ? `
          <div class="dado-item">
            <div class="dado-label">CNPJ</div>
            <div class="dado-valor cnpj">${formatCnpj(ca.cnpj)}</div>
          </div>` : ''}

          ${ca.abrangencia ? `
          <div class="dado-item">
            <div class="dado-label">Natureza</div>
            <div class="dado-valor">${ca.abrangencia}</div>
          </div>` : ''}

          ${ca.nup ? `
          <div class="dado-item">
            <div class="dado-label">N° Processo (NUP)</div>
            <div class="dado-valor" style="font-family:monospace;font-size:12px;">${ca.nup}</div>
          </div>` : ''}

          ${ca.marcacao ? `
          <div class="dado-item">
            <div class="dado-label">Marcação no produto</div>
            <div class="dado-valor valida-loc">${ca.marcacao}</div>
          </div>` : ''}

          ${ca.referencias ? `
          <div class="dado-item">
            <div class="dado-label">Referências / Modelo</div>
            <div class="dado-valor">${ca.referencias}</div>
          </div>` : ''}

          ${ca.cor ? `
          <div class="dado-item" style="grid-column: 1 / -1;">
            <div class="dado-label">Cor</div>
            <div class="dado-valor">${ca.cor}</div>
          </div>` : ''}

        </div>

        <!-- APROVADO PARA -->
        ${ca.aprovadoPara ? `
        <div class="ca-descricao-section">
          <div class="section-label">Aprovado para</div>
          <div class="ca-descricao-texto">${ca.aprovadoPara}</div>
        </div>` : ''}

        <!-- OBSERVAÇÃO -->
        ${ca.observacao ? `
        <div class="ca-descricao-section">
          <div class="section-label">Observação</div>
          <div class="ca-descricao-texto">${ca.observacao}</div>
        </div>` : ''}

        <!-- RESTRIÇÃO DO LAUDO -->
        ${ca.restricaoLaudo ? `
        <div class="ca-descricao-section">
          <div class="section-label">Restrição do laudo</div>
          <div class="ca-descricao-texto">${ca.restricaoLaudo}</div>
        </div>` : ''}

        <!-- DADOS DO LAUDO -->
        ${ca.nrLaudo || ca.laboratorio || ca.norma ? `
        <div class="ca-dados-section" style="background:#f8f9fb; border-top: 1px solid #f0f2f5;">

          ${ca.nrLaudo ? `
          <div class="dado-item" style="grid-column: 1 / -1;">
            <div class="dado-label">N° do Laudo</div>
            <div class="dado-valor">${ca.nrLaudo}</div>
          </div>` : ''}

          ${ca.laboratorio ? `
          <div class="dado-item" style="grid-column: 1 / -1;">
            <div class="dado-label">Laboratório</div>
            <div class="dado-valor">${ca.laboratorio}</div>
          </div>` : ''}

          ${ca.cnpjLaboratorio ? `
          <div class="dado-item">
            <div class="dado-label">CNPJ do Laboratório</div>
            <div class="dado-valor cnpj">${formatCnpj(ca.cnpjLaboratorio)}</div>
          </div>` : ''}

          ${ca.norma ? `
          <div class="dado-item">
            <div class="dado-label">Norma</div>
            <div class="dado-valor">${ca.norma}</div>
          </div>` : ''}

        </div>` : ''}

        <!-- DESCRIÇÃO TÉCNICA (ao final) -->
        ${ca.descricao ? `
        <div class="ca-descricao-section">
          <div class="section-label">Descrição técnica do produto</div>
          <div class="ca-descricao-texto">${ca.descricao}</div>
        </div>` : ''}

        <!-- ALERTAS -->
        ${alertaVencido}
        ${alertaCancelado}

        <!-- RODAPÉ DO CARD -->
        <div class="ca-card-footer">
          <span class="ca-fonte">
            Fonte: Ministério do Trabalho e Emprego — Base CAEPI
          </span>
        </div>

      </div>`;
  }

  function formatCnpj(cnpj) {
    const d = cnpj.replace(/\D/g, '');
    if (d.length === 14)
      return d.replace(/(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})/, '$1.$2.$3/$4-$5');
    return cnpj;
  }

  function formatData(data) {
    if (!data) return '';
    // Converte YYYY-MM-DD → DD/MM/YYYY se necessário
    const iso = data.match(/^(\d{4})-(\d{2})-(\d{2})/);
    if (iso) return `${iso[3]}/${iso[2]}/${iso[1]}`;
    return data;
  }
</script>

</body>
</html>
